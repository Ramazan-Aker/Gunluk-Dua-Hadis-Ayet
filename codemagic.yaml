workflows:
  ios-release:
    name: iOS App Store Release
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Apple Developer

    environment:
      groups:
        - ios_signing
      flutter: stable
      xcode: latest
      ruby: 3.3.8
      cocoapods: default
      vars:
        BUNDLE_ID: "com.tahram.gunlukduahadis"
        APP_STORE_APPLE_ID: "6792362734"

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Flutter Launcher Icons (iOS)
        script: flutter pub run flutter_launcher_icons

      - name: Flutter Native Splash
        script: flutter pub run flutter_native_splash:create

      - name: Disable Swift Package Manager (CocoaPods uyumu)
        script: flutter config --no-enable-swift-package-manager

      - name: Pod install
        script: |
          cd ios
          gem install cocoapods --no-document
          pod install --repo-update
          cd ..

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch iOS signing files
        script: |
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          PROFILE_PATH="$(mktemp "$PROFILES_HOME"/$(uuidgen).mobileprovision)"
          echo ${CM_PROVISIONING_PROFILE} | base64 --decode > "$PROFILE_PATH"
          echo "Saved provisioning profile $PROFILE_PATH"
          echo ${CM_CERTIFICATE} | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password ${CM_CERTIFICATE_PASSWORD}

      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles

      - name: Set build number
        script: |
          BUILD_NUMBER=$(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID") + 1))
          cd ios
          agvtool new-version -all "$BUILD_NUMBER"

      - name: Build iOS IPA
        script: |
          set -eo pipefail

          # ExportOptions oluştur
          cat > /tmp/ExportOptions.plist << 'PLIST_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>F7TL9YHWSA</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.tahram.gunlukduahadis</key>
              <string>HerGunIslam_AppStore</string>
            </dict>
          </dict>
          </plist>
          PLIST_EOF

          # Archive olustur
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            archive \
            -archivePath /tmp/Runner.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=F7TL9YHWSA \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="HerGunIslam_AppStore"

          # IPA export
          mkdir -p build/ios/ipa
          xcodebuild \
            -exportArchive \
            -archivePath /tmp/Runner.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath build/ios/ipa


    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
