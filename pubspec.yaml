name: daily_dua_hadith
description: A beautiful Flutter app to display daily Dua, Hadith, and Quran Ayah
publish_to: 'none'
version: 1.0.11+15

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.2
  google_fonts: ^6.2.1
  scrollable_positioned_list: ^0.3.8
  
  # State Management & Data
  shared_preferences: ^2.2.2
  
  # Networking
  http: ^1.2.2
  cached_network_image: ^3.3.1
  
  # Sharing
  share_plus: ^7.2.1
  path_provider: ^2.1.2
  
  # Screenshot/Image Generation
  widgets_to_image: ^2.0.1
  
  # Ads
  google_mobile_ads: ^7.0.0
  app_tracking_transparency: ^2.0.6
  
  # Utilities
  intl: ^0.18.1
  characters: ^1.4.0
  
  # Audio playback
  audioplayers: ^5.2.1
  
  # Notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  
  # Firebase
  firebase_core: ^3.6.0
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3
  home_widget: ^0.9.0
  flutter_native_splash: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_native_splash:
  color: "#1a237e"
  image: assets/app_icon.png
  android: true
  ios: true
  android_gravity: center
  fullscreen: true
  android_12:
    color: "#1a237e"
    image: assets/app_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#1a237e"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/data.json
    - assets/greeting_messages.json
    - assets/quran_offline.json

